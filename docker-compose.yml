services:
  # ==========================================================
  # MYSQL DATABASE
  # ==========================================================
  db:
    image: mysql:8.0
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ekspedisi_aja
      MYSQL_USER: ekspedisi
      MYSQL_PASSWORD: ekspedisi_secret
      MYSQL_ROOT_PASSWORD: root_super_secret_pass

    ports:
      - "3306:3306"

    volumes:
      - db-volume:/var/lib/mysql

    networks:
      - ujikom-net

    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -proot_super_secret_pass --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s


  # ==========================================================
  # PRISMA DATABASE INITIALIZATION
  # Berjalan satu kali lalu berhenti dengan status exited 0
  # ==========================================================
  migrate:
    image: ekspedisi-app:ukk
    restart: "no"

    environment:
      DATABASE_URL: mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_aja

    depends_on:
      db:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c

    command:
      - |
        set -eu

        echo "============================================"
        echo " Menyiapkan schema database dengan Prisma"
        echo "============================================"

        npx prisma db push --skip-generate

        echo "============================================"
        echo " Menjalankan seed database"
        echo "============================================"

        npx prisma db seed

        echo "============================================"
        echo " Database berhasil disiapkan"
        echo "============================================"

    networks:
      - ujikom-net


  # ==========================================================
  # NEXT.JS APPLICATION
  # Jalankan sebanyak dua container dengan --scale app=2
  # ==========================================================
  app:
    image: ekspedisi-app:ukk

    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}

    restart: unless-stopped

    env_file:
      - .env

    environment:
      # Nilai ini menimpa DATABASE_URL lokal dari .env
      DATABASE_URL: mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_aja

      # IP VM2 dari soal real
      APP_URL: http://192.168.12.94:8080

      NODE_ENV: production

      DB_HOST: db
      DB_PORT: "3306"

    # Tidak boleh menggunakan ports
    expose:
      - "3000"

    # Shared persistent storage untuk kedua replica aplikasi
    volumes:
      - app-volume:/app/public/uploads

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    networks:
      - ujikom-net


  # ==========================================================
  # NGINX LOAD BALANCER
  # ==========================================================
  loadbalancer:
    image: nginx:alpine
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      app:
        condition: service_started

    networks:
      - ujikom-net


# ============================================================
# NAMED VOLUMES SESUAI SOAL
# ============================================================
volumes:
  app-volume:
    name: app-volume

  db-volume:
    name: db-volume


# ============================================================
# DOCKER NETWORK SESUAI SOAL
# ============================================================
networks:
  ujikom-net:
    name: ujikom-net
    driver: bridge