services:
  db:
    image: mysql:8.0
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ekspedisi_aja
      MYSQL_USER: ekspedisi
      MYSQL_PASSWORD: ekspedisi_secret
      MYSQL_ROOT_PASSWORD: root_super_secret_pass

    ports:
      - "3306:3306"

    volumes:
      - db-volume:/var/lib/mysql

    networks:
      - ujikom-net

    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -proot_super_secret_pass --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s


  migrate:
    image: ekspedisi-app:ukk
    restart: "no"

    environment:
      DATABASE_URL: mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_aja

    depends_on:
      db:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c

    command:
      - |
        set -eu

        echo "Menyiapkan schema database..."
        npx prisma db push --skip-generate

        echo "Menjalankan seed database..."
        npx prisma db seed

        echo "Database berhasil disiapkan."

    networks:
      - ujikom-net


  app:
    image: ekspedisi-app:ukk

    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_aja
      APP_URL: http://192.168.12.94:8080
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: "3306"

    expose:
      - "3000"

    volumes:
      - app-volume:/app/public/uploads

    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    networks:
      - ujikom-net


  loadbalancer:
    image: nginx:alpine
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      app:
        condition: service_started

    networks:
      - ujikom-net


volumes:
  app-volume:
    name: app-volume

  db-volume:
    name: db-volume


networks:
  ujikom-net:
    name: ujikom-net
    driver: bridge