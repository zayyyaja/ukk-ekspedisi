services:
  database:
  image: mysql:8.0
  restart: unless-stopped

  environment:
    MYSQL_DATABASE: ekspedisi_aja
    MYSQL_USER: ekspedisi
    MYSQL_PASSWORD: ekspedisi_secret
    MYSQL_ROOT_PASSWORD: root_super_secret_pass

  ports:
    - "3306:3306"

  volumes:
    - volume-ujikom:/var/lib/mysql

  networks:
    - network-ujikom

  healthcheck:
    test:
      [
        "CMD-SHELL",
        "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"
      ]
    interval: 5s
    timeout: 5s
    retries: 20
    start_period: 20s


  migrate:
    image: ekspedisi-app:ukk

    build:
      context: .
      dockerfile: Dockerfile

    restart: "no"

    environment:
      DATABASE_URL: mysql://ekspedisi:ekspedisi_secret@database:3306/ekspedisi_aja

    depends_on:
      database:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c

    command:
      - |
        set -eu

        echo "Menyiapkan schema database..."
        npx prisma db push --skip-generate

        echo "Menjalankan seed database..."
        npx prisma db seed

        echo "Database berhasil disiapkan."

    networks:
      - network-ujikom


  web:
    image: ekspedisi-app:ukk

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: mysql://ekspedisi:ekspedisi_secret@database:3306/ekspedisi_aja
      APP_URL: http://localhost:8080
      NODE_ENV: production
      DB_HOST: database
      DB_PORT: "3306"

    expose:
      - "3000"

    depends_on:
      database:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

    networks:
      - network-ujikom


  loadbalancer:
    image: nginx:alpine
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      web:
        condition: service_started

    networks:
      - network-ujikom


volumes:
  volume-ujikom:
    name: volume-ujikom


networks:
  network-ujikom:
    name: network-ujikom
    driver: bridge