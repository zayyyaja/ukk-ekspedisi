version: '3.8'

services:
  # Container 1: Database MySQL
  db:
    image: mysql:8.0
    container_name: ekspedisi_db
    restart: always
    environment:
      MYSQL_DATABASE: ekspedisi_online
      MYSQL_USER: ekspedisi
      MYSQL_PASSWORD: ekspedisi_secret
      MYSQL_ROOT_PASSWORD: root_super_secret_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ekspedisi_network

  # Container 2: Aplikasi Next.js
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekspedisi_web
    restart: always
    environment:
      - DATABASE_URL=mysql://ekspedisi:ekspedisi_secret@db:3306/ekspedisi_online
      - APP_URL=https://ekspedisi.local
      - NODE_ENV=production
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - ekspedisi_network

  # Container 3: Nginx Web Server / SSL Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ekspedisi_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - ekspedisi_network

volumes:
  mysql_data:

networks:
  ekspedisi_network:
    driver: bridge