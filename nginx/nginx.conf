# ============================================================
# WEBSOCKET CONNECTION
# ============================================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}


# ============================================================
# NEXT.JS CLUSTER
#
# Nama "web" mengarah ke replica service web yang berada
# dalam network Docker yang sama.
#
# Nginx menggunakan least connection untuk mendistribusikan
# request ke container yang memiliki koneksi paling sedikit.
# ============================================================
upstream nextjs_cluster {
    least_conn;

    server web:3000;

    keepalive 32;
}


# ============================================================
# HTTP SERVER
# ============================================================
server {
    listen 80 default_server;
    server_name _;

    # Mendukung upload lampiran atau foto hingga 25 MB
    client_max_body_size 25M;


    # Endpoint pengujian Nginx
    location = /nginx-health {
        access_log off;

        default_type text/plain;
        return 200 "Nginx load balancer aktif\n";
    }


    # Seluruh request aplikasi diteruskan ke cluster Next.js
    location / {
        proxy_pass http://nextjs_cluster;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Apabila salah satu container gagal, coba container berikutnya
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # Mempermudah pembuktian alamat upstream yang melayani request
        add_header X-Upstream-Address $upstream_addr always;
    }
}