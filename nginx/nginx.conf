server {
    listen 80;
    server_name ekspedisi.local;
    # Redirect otomatis dari HTTP ke HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ekspedisi.local;

    # Lokasi sertifikat SSL di dalam container Nginx
    ssl_certificate /etc/nginx/ssl/ekspedisi.crt;
    ssl_certificate_key /etc/nginx/ssl/ekspedisi.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Mengatur batas upload jika ada lampiran/foto manifest berukuran besar
    client_max_body_size 25M;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}